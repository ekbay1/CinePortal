name: Production CI and Deployment

on:
  pull_request:
    branches:
      - main
    types:
      - closed
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cineportal-production-${{ github.ref }}
  cancel-in-progress: false

jobs:
  backend-tests:
    name: Backend Tests
    if: ${{ github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: cineportal_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d cineportal_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend lint
        run: |
          cd backend
          python -m ruff check app tests

      - name: Run backend tests
        run: |
          cd backend
          python -m pytest
        env:
          DATABASE_URL: postgresql://neondb_owner:npg_0Xj8zRklgvIB@ep-morning-mud-afafce3b-pooler.c-2.us-west-2.aws.neon.tech/neondb?sslmode=require&channel_binding=require
          SECRET_KEY: bdc288d753b30c025c79a22b1922d812650937ad10aaf6d329e7e0dbf4974483
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 30
          STRIPE_SECRET_KEY: sk_test_51QbY2OGClu0pWsDi8ZxmH8iyGhbiCUda5x3X2cRSTHOHqvh9dBdL3s559UlfeRH6pp8yzEX8kn7iwwTVKs8jBkhm00NBZQroWv
          STRIPE_WEBHOOK_SECRET: whsec_b5NP1G0Pj6mv9ABjfVzxF2eIcEku8DiM
          STRIPE_PRICE_BASE: price_1Tq1TsGClu0pWsDirVqsti0C
          STRIPE_PRICE_DISNEY: price_1Tq282GClu0pWsDi6jdAOcF3
          STRIPE_PRICE_MAX: price_1Tq2IHGClu0pWsDihiIlJKrD
          STRIPE_PRICE_PEACOCK: price_1Tq2MxGClu0pWsDi6wm44h0t
          STRIPE_PRICE_PRIME: price_1Tq2OYGClu0pWsDifYCoyKWV

  frontend-tests:
    name: Frontend Tests
    if: ${{ github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install npm 11.10.1
        run: npm install --global npm@11.10.1

      - name: Display Node and npm versions
        run: |
          node --version
          npm --version

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Run frontend lint
        run: |
          cd frontend
          npm run lint

      - name: Build frontend
        run: |
          cd frontend
          npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  deploy-production:
    name: Deploy Production
    if: ${{ github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest

    needs:
      - backend-tests
      - frontend-tests

    if: >-
      (github.event_name == 'push' &&
      github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' &&
      github.ref == 'refs/heads/main')

    environment:
      name: production
      url: ${{ vars.FRONTEND_URL }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Trigger production Render deployment
        run: |
          cd backend
          curl \
            --fail \
            --show-error \
            --silent \
            --request POST \
            "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull production Vercel configuration
        run: |
          cd frontend
          vercel pull \
            --yes \
            --environment=production \
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN_PROD }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build production frontend
        run: |
          cd frontend
          vercel build \
            --prod \
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN_PROD }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy production frontend
        run: |
          cd frontend
          vercel deploy \
            --prebuilt \
            --prod \
            --yes \
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN_PROD }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}