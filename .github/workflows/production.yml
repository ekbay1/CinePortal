name: Production CI and Deployment

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cineportal-production-${{ github.ref }}
  cancel-in-progress: false

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: cineportal_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d cineportal_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend lint
        run: |
          cd backend
          python -m ruff check app tests

      - name: Run backend tests
        run: |
          cd backend
          python -m pytest
        env:
          DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/cineportal_test
          SECRET_KEY: production-ci-secret-key
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 30
          STRIPE_SECRET_KEY: sk_test_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_placeholder

  frontend-tests:
    name: Frontend Checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Run frontend lint
        run: |
          cd frontend
          npm run lint

      - name: Build frontend
        run: |
          cd frontend
          npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest

    needs:
      - backend-tests
      - frontend-checks

    if: >-
      (github.event_name == 'push' &&
      github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' &&
      github.ref == 'refs/heads/main')

    environment:
      name: production
      url: ${{ vars.FRONTEND_URL }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Trigger production Render deployment
        run: |
          cd backend
          curl \
            --fail \
            --show-error \
            --silent \
            --request POST \
            "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull production Vercel configuration
        run: |
          cd frontend
          vercel pull \
            --yes \
            --environment=production \
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build production frontend
        run: |
          cd frontend
          vercel build \
            --prod \
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy production frontend
        run: |
          cd frontend
          vercel deploy \
            --prebuilt \
            --prod \
            --yes \
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}