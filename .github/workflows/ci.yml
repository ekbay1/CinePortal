name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: cineportal
          POSTGRES_USER: cineportal_user
          POSTGRES_PASSWORD: cineportal_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U cineportal_user -d cineportal_password"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql://neondb_owner:npg_0Xj8zRklgvIB@ep-morning-mud-afafce3b-pooler.c-2.us-west-2.aws.neon.tech/neondb?sslmode=require&channel_binding=require
      SECRET_KEY: bdc288d753b30c025c79a22b1922d812650937ad10aaf6d329e7e0dbf4974483
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      FRONTEND_URL: https://cine-portal-omega.vercel.app
      BACKEND_CORS_ORIGINS: https://cine-portal-omega.vercel.app,http://localhost:3000

      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_PRICE_BASE: price_1Tq1TsGClu0pWsDirVqsti0C
      STRIPE_PRICE_DISNEY: price_1Tq282GClu0pWsDi6jdAOcF3
      STRIPE_PRICE_MAX: price_1Tq2IHGClu0pWsDihiIlJKrD
      STRIPE_PRICE_PEACOCK: price_1Tq2MxGClu0pWsDi6wm44h0t
      STRIPE_PRICE_PRIME: price_1Tq2OYGClu0pWsDifYCoyKWV

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Run backend lint
        run: ruff check .

      - name: Run database migrations
        run: alembic upgrade head

      - name: Seed database
        run: python -m app.db.seed

      - name: Run backend tests
        run: pytest --cov=app --cov-report=term-missing

  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    env:
      NEXT_PUBLIC_API_URL: https://cineportal-deck.onrender.com 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend lint
        run: npm run lint

      - name: Build frontend
        run: npm run build